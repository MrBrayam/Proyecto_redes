<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Conductor | AristaRideAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="role-conductor">
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="brand-title">AristaRideAI</div>
        <div class="brand-sub">Ingreso para conductores</div>
      </div>
      <nav class="role-switch">
        <a href="login-cliente.html">Cliente</a>
        <a class="active" href="login-conductor.html">Conductor</a>
        <a href="login-admin.html">Admin</a>
      </nav>
    </header>

    <main class="main">
      <section class="login-card">
        <h1 class="login-title">Hola, conductor</h1>
        <p class="login-subtitle">Accede para recibir viajes en tiempo real.</p>

        <form>
          <div class="form-group">
            <label for="email">Correo</label>
            <input id="email" name="email" type="email" placeholder="conductor@correo.com" required />
          </div>

          <div class="form-group">
            <label for="password">Contrasena</label>
            <input id="password" name="password" type="password" placeholder="Tu clave" required />
          </div>

          <div class="actions">
            <label>
              <input type="checkbox" name="recordar" />
              Mantener sesion
            </label>
            <span>Problemas para ingresar?</span>
          </div>

          <button class="primary-button" type="submit">Ingresar</button>
        </form>

        <div class="helper">
          Nuevo conductor? <a href="#">Solicitar alta</a>
        </div>
      </section>
    </main>

    <footer class="footer">Panel de conductores AristaRideAI</footer>
  </div>
</body>
</html>
